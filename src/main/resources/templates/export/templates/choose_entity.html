<!-- src/main/resources/templates/export/templates/choose_entity.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: html(
        ~{::title},
        ~{::div.content},
        ~{},
        ~{},
        'Выбор типа сущности для шаблона',
        ~{::div.page-actions}
      )}">
<head>
    <title>Выбор типа сущности для шаблона</title>
</head>
<body>
<!-- Действия страницы -->
<div class="page-actions">
    <a th:href="@{/clients/{id}/export/templates(id=${client.id})}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Назад к списку шаблонов
    </a>
</div>

<!-- Основное содержимое -->
<div class="content">
    <div class="card">
        <div class="card-header">
            <h4>Создание нового шаблона экспорта</h4>
        </div>
        <div class="card-body">
            <p class="mb-4">
                Выберите тип сущности для нового шаблона экспорта. После выбора типа сущности
                вы сможете настроить формат файла и выбрать поля для экспорта.
            </p>

            <!-- Форма выбора типа сущности -->
            <form th:action="@{/clients/{id}/export/templates/new(id=${client.id})}" method="get">
                <div class="mb-4">
                    <label for="entityType" class="form-label">Тип сущности</label>
                    <select id="entityType" name="entityType" class="form-select" required>
                        <option value="" selected disabled>-- Выберите тип сущности --</option>
                        <option th:each="entity : ${entityTypes}"
                                th:value="${entity.entityType}"
                                th:text="${entity.displayName}">
                            Тип сущности
                        </option>
                    </select>
                    <div class="form-text">
                        Тип сущности определяет, какие данные будут доступны для экспорта.
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-arrow-right"></i> Продолжить
                    </button>

                    <a th:href="@{/clients/{id}/export/templates(id=${client.id})}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
